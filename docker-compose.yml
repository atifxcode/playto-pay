version: "3.9"

x-app-backend: &app-backend
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: ./backend/.env
  volumes:
    - ./backend:/app
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-django}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-django}
      POSTGRES_DB: ${POSTGRES_DB:-payouts_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-django} -d ${POSTGRES_DB:-payouts_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    <<: *app-backend
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  worker:
    <<: *app-backend
    command: celery -A backend worker -l INFO

  beat:
    <<: *app-backend
    command: celery -A backend beat -l INFO

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=https://playto-pay-w0s5.onrender.com
    depends_on:
      - backend

volumes:
  postgres_data:
